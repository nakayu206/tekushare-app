<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>てくしぇあ - 招待リンク</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 8px; }
    p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: block;
      background: #4CAF87;
      color: white;
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
    }
    .btn-sub {
      display: block;
      color: #4CAF87;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 15px;
      border: 1.5px solid #4CAF87;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚶</div>
    <h1>てくしぇあへの招待</h1>
    <p>散歩スポットをシェアするアプリ「てくしぇあ」に招待されました。アプリをインストールして招待を承認してください。</p>
    <a id="store-link" class="btn" href="https://play.google.com/store/apps/details?id=com.example.tekushare">
      Google Play でインストール
    </a>
    <a id="open-link" class="btn-sub" href="#">アプリを開く</a>
  </div>
  <script>
    const token = location.pathname.split('/').filter(Boolean).pop();
    const appScheme = 'tekushare://link/' + token;
    document.getElementById('open-link').href = appScheme;

    // アプリがインストール済みなら即時遷移を試みる
    const start = Date.now();
    location.href = appScheme;
    setTimeout(() => {
      // アプリが開いていなければ（ページがまだ表示中なら）ストアへ
      if (Date.now() - start < 2500) {
        // ページがフォーカスを失っていない = アプリが開かなかった
      }
    }, 2000);
  </script>
</body>
</html>
