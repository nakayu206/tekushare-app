# パッケージ定義
name: tekushare
description: 散歩の記録・共有・見守りができるアプリ
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  geolocator: ^14.0.3
  flutter_local_notifications: ^22.0.1
  image_picker: ^1.2.2
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.6
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  flutter_map: ^8.3.1
  app_links: ^6.4.0
  latlong2: ^0.10.1
  url_launcher: ^6.3.2
  flutter_sms: ^3.0.1
  shared_preferences: ^2.3.4
  firebase_storage: 13.4.3
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ">=5.4.4 <5.6.5"
  fake_cloud_firestore: ^4.1.0
  firebase_auth_mocks: ^0.15.2
  build_runner: ^2.4.0
  plugin_platform_interface: ^2.1.8
  isar_generator: ^3.1.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/teku_app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFCF3"
  adaptive_icon_foreground: "assets/icon/teku_app_icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFCF3"
  image: assets/icon/teku_app_icon.png
  android_12:
    color: "#FFFCF3"
    image: assets/icon/teku_app_icon.png

flutter:
  uses-material-design: true

  assets:
    - assets/SVG/