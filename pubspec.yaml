# パッケージ定義
name: tekushare
description: 散歩の記録・共有・見守りができるアプリ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/SVG/