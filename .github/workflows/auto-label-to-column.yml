name: Auto Label to Column

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

jobs:
  add-labeled-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add labeled item to project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/nakayu206/projects/3
          github-token: ${{ secrets.PROJECT_TOKEN }}
          labeled: UI, Logic, Bug
          label-operator: OR
