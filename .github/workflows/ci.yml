name: CI

# 何をする？
#   PR と main への push のたびに、フォーマット・静的解析・テストを自動実行する。
#   壊れたコードが main に入るのを防ぐのが目的。
#
# テスト方針
#   - 単体テスト (test/): ウィジェット・ロジックを1件ずつ責務単位でテスト
#   - 結合テスト (integration_test/): ユーザー操作の流れをまとめてテスト
#                                     CI では Linux デスクトップターゲットで実行

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリのコードを取得
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Flutter SDK をセットアップ
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 3. Linux デスクトップ向けシステム依存パッケージを取得（結合テスト用）
      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev xvfb

      # 4. 依存パッケージを取得
      - name: Install dependencies
        run: flutter pub get

      # 5. フォーマットチェック（差分があれば失敗）
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      # 6. 静的解析
      - name: Analyze
        run: flutter analyze

      # 7. リポジトリテスト用の Isar ネイティブバイナリをセットアップ
      #    dlopen はカレントディレクトリや LD_LIBRARY_PATH より ldconfig キャッシュを優先するため、
      #    /usr/local/lib にコピーして ldconfig でキャッシュ更新するのが最も確実。
      - name: Setup Isar binary for unit tests
        run: |
          ISAR_LIB=$(find ~/.pub-cache -name "libisar.so" | head -1)
          if [ -z "$ISAR_LIB" ]; then
            echo "ERROR: libisar.so not found in pub cache"
            find ~/.pub-cache -path "*/isar*" -name "*.so" 2>/dev/null || true
            exit 1
          fi
          echo "Found: $ISAR_LIB"
          sudo cp "$ISAR_LIB" /usr/local/lib/libisar.so
          sudo ldconfig

      # 8. 単体テスト（test/ 配下）
      - name: Run unit tests
        run: flutter test --reporter expanded

      # 9. 結合テスト（integration_test/ 配下）— Linux デスクトップターゲットで実行
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Run integration tests
        run: xvfb-run flutter test integration_test/ -d linux --reporter expanded
